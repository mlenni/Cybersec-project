{% extends "notes/base.html" %}

{% block content %}
<h2>Fetch URL</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="url" placeholder="https://example.com">
    <button type="submit">Fetch</button>
</form>

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}

{% if result %}
<h3>Result preview</h3>
<pre>{{ result }}</pre>
{% endif %}
{% endblock %}
