{% extends "notes/base.html" %}

{% block content %}
<h2>Search Notes</h2>

<form method="get">
    <input type="text" name="q" value="{{ q }}">
    <button type="submit">Search</button>
</form>

<ul>
{% for note in notes %}
    <li>
        <a href="{% url 'note_detail' note.id %}">
            {{ note.title }} by {{ note.owner.username }}
        </a>
    </li>
{% empty %}
    {% if q %}
        <li>No results.</li>
    {% endif %}
{% endfor %}
</ul>
{% endblock %}
